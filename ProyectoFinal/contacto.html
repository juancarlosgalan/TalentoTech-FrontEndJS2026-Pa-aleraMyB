<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pañalera MyB - Contacto</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <!-- Archivo CSS externo -->
    <link rel="stylesheet" href="/ProyectoFinal/Css/estilo.css">
</head>
<body>

    <header>
        <!-- Logo -->
        <img src="Imagenes/Logo Pañalera.jpeg" alt="Logo Pañalera MyB" class="logo">
        <h1>Pañalera MyB</h1>
        <p>Todo para el cuidado de tu bebé</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html#productos">Productos</a></li>
            <li><a href="index.html#resenas">Reseñas</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main>
        <section id="contacto">
            <h2>Contacto</h2>
            
            <!-- Imagen de contacto  -->
            <img src="Imagenes/bebesonriendo.jpg" alt="Bebé sonriendo" class="imagen-contacto">

            <!-- Formulario Formspree -->
            <form action="https://formspree.io" method="POST">
                <div class="grupo-campo">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="grupo-campo">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="grupo-campo completo">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Escribe tu consulta aquí..." required></textarea>
                </div>

                <button type="submit">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Pañalera MyB - Todos los derechos reservados.</p>
    </footer>

</body>
</html>
